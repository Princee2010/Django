<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>
    <h1>Users List</h1>
    {% load cache %}
    {% cache 30 user_list_section%}
    <ul>
        {% for user in users %}
            <li>{{ user.name }} — {{ user.subscriber }} subscribers</li>
        {% endfor %}
    </ul>
    {% endcache %}
</body>
</html>
